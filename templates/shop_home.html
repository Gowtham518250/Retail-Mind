<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ shop.shop_name }}</title>
  <style>
    body{font-family:Inter,Arial;background:#f5f7fb;margin:0}
    .top{background:#fff;border-bottom:1px solid #e6e9ee;padding:12px 20px;display:flex;align-items:center;gap:12px}
    .logo{height:56px;width:56px;object-fit:cover;border-radius:8px}
    .container{max-width:1100px;margin:18px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
    .card{background:#fff;padding:12px;border-radius:8px}
    .card img{height:140px;object-fit:contain;width:100%;background:#fafafa;border-radius:6px}
    .price{font-weight:800;margin-top:8px}
  </style>
</head>
<body>
  <div class="top">
    {% if shop.logo_url %}<img class="logo" src="{{ shop.logo_url }}" alt="logo" />{% endif %}
    <div>
      <div style="font-weight:800">{{ shop.shop_name }}</div>
      <div style="color:#6b7280">{{ shop.city }} • {{ shop.phone }}</div>
    </div>
  </div>
  <div class="container">
    <h2>Products</h2>
    <div class="grid">
      {% for p in products %}
      <div class="card">
        <img src="{{ p.image_url if p.image_url is defined else (p.logo_file_path if p.logo_file_path else '') }}" alt="{{ p.product_name }}" onerror="this.style.display='none'"/>
        <div style="font-weight:700;margin-top:8px">{{ p.product_name }}</div>
        <div class="price">₹{{ '%.2f'|format(p.unit_price) }}</div>
        <div class="muted">Stock: {{ p.current_stock }}</div>
        <div style="margin-top:8px"><a href="/product/{{ p.id }}">View</a></div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
