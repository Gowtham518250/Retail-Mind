<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retail Mind - Smart Shopping</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ── Advanced Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
    --secondary: #10b981;
    --accent: #f59e0b;
    --danger: #ef4444;
    --dark: #0f172a;
    --dark-light: #1e293b;
    --gray: #64748b;
    --gray-light: #94a3b8;
    --light: #f8fafc;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-display: 'Poppins', system-ui, sans-serif;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Advanced Header ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    box-shadow: var(--shadow-md);
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .search-bar {
    flex: 1;
    max-width: 500px;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border: 2px solid var(--gray-light);
    border-radius: var(--radius-lg);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    background: var(--light);
    color: var(--dark);
    outline: none;
    transition: var(--transition);
  }

  .search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray);
    pointer-events: none;
  }

  .cart-button {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--white);
    border: none;
    padding: 0.75rem 1.25rem;
    border-radius: var(--radius-lg);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow-md);
  }

  .cart-button:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .cart-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--danger);
    color: var(--white);
    font-size: 0.75rem;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Hero Section ── */
  .hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--white);
    padding: 3rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.3;
  }

  .hero-content {
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
  }

  .hero-subtitle {
    font-size: 1.1rem;
    opacity: 0.9;
    margin-bottom: 1.5rem;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .hero-stat {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    padding: 0.5rem 1rem;
    border-radius: var(--radius-md);
    font-size: 0.85rem;
    font-weight: 600;
  }

  /* ── Category Filter ── */
  .category-filter {
    padding: 1.5rem;
    background: var(--white);
    border-bottom: 1px solid var(--gray-light);
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }

  .category-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    border: 2px solid var(--gray-light);
    border-radius: var(--radius-full);
    background: var(--white);
    color: var(--gray);
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: var(--transition);
    margin-right: 0.5rem;
  }

  .category-chip:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .category-chip.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
  }

  /* ── Product Grid ── */
  .products-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .product-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-xl);
  }

  .product-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--gray-light) 0%, var(--gray) 100%);
  }

  .product-content {
    padding: 1.25rem;
  }

  .product-category {
    font-size: 0.75rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .product-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .product-price {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 0.5rem;
  }

  .product-stock {
    font-size: 0.85rem;
    color: var(--gray);
    margin-bottom: 1rem;
  }

  .product-stock.low {
    color: var(--danger);
  }

  .add-to-cart-btn {
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--white);
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .add-to-cart-btn:hover {
    transform: scale(1.02);
    box-shadow: var(--shadow-md);
  }

  .add-to-cart-btn:disabled {
    background: var(--gray);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Cart Drawer ── */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
  }

  .cart-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .cart-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    max-width: 450px;
    height: 100%;
    background: var(--white);
    z-index: 2001;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }

  .cart-drawer.active {
    transform: translateX(0);
  }

  .cart-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--gray-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cart-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.25rem;
  }

  .close-cart {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--gray);
    transition: var(--transition);
  }

  .close-cart:hover {
    color: var(--danger);
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
  }

  .cart-item {
    display: flex;
    gap: 1rem;
    padding: 1rem;
    background: var(--light);
    border-radius: var(--radius-md);
    margin-bottom: 1rem;
  }

  .cart-item-image {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: var(--radius-sm);
  }

  .cart-item-details {
    flex: 1;
  }

  .cart-item-name {
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .cart-item-price {
    color: var(--primary);
    font-weight: 700;
  }

  .cart-item-quantity {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .quantity-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--gray-light);
    background: var(--white);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }

  .quantity-btn:hover {
    background: var(--primary);
    color: var(--white);
    border-color: var(--primary);
  }

  .cart-footer {
    padding: 1.5rem;
    border-top: 1px solid var(--gray-light);
    background: var(--light);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 1.25rem;
    font-weight: 700;
  }

  .checkout-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%);
    color: var(--white);
    border: none;
    border-radius: var(--radius-lg);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition);
  }

  .checkout-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  /* ── Order Form ── */
  .order-form {
    padding: 1.5rem;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--dark);
  }

  .form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid var(--gray-light);
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
    font-size: 0.95rem;
    transition: var(--transition);
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
  }

  .error-message {
    color: var(--danger);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  /* ── Loading & Empty States ── */
  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--gray);
  }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--gray);
  }

  .empty-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }

  /* ── Success Modal ── */
  .success-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3000;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
  }

  .success-modal.active {
    opacity: 1;
    visibility: visible;
  }

  .success-content {
    background: var(--white);
    padding: 2rem;
    border-radius: var(--radius-xl);
    text-align: center;
    max-width: 400px;
    transform: scale(0.9);
    transition: var(--transition);
  }

  .success-modal.active .success-content {
    transform: scale(1);
  }

  .success-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }

  .success-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .success-message {
    color: var(--gray);
    margin-bottom: 1.5rem;
  }

  .success-btn {
    padding: 0.75rem 2rem;
    background: var(--primary);
    color: var(--white);
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .success-btn:hover {
    background: var(--primary-dark);
  }

  /* ── Responsive Design ── */
  @media (max-width: 768px) {
    .app-header {
      padding: 0.75rem 1rem;
    }

    .logo {
      font-size: 1.25rem;
    }

    .search-bar {
      display: none;
    }

    .products-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .cart-drawer {
      max-width: 100%;
    }

    .hero-title {
      font-size: 1.75rem;
    }
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-card {
    animation: fadeIn 0.5s ease-out;
  }

  .loading-spinner {
    border: 3px solid var(--gray-light);
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="logo">🛒 Retail Mind</div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="Search products..." id="search-input">
    </div>
    <button class="cart-button" onclick="toggleCart()">
      🛒
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="shop-name">Loading Shop...</h1>
      <p class="hero-subtitle" id="shop-description">Discover amazing products at great prices</p>
      <div class="hero-stats">
        <div class="hero-stat">📦 <span id="product-count">0</span> Products</div>
        <div class="hero-stat">⭐ <span id="shop-rating">4.5</span> Rating</div>
        <div class="hero-stat">🚚 Fast Delivery</div>
      </div>
    </div>
  </section>

  <!-- Category Filter -->
  <div class="category-filter" id="category-filter">
    <button class="category-chip active" data-category="all">All Products</button>
    <button class="category-chip" data-category="groceries">🥬 Groceries</button>
    <button class="category-chip" data-category="electronics">📱 Electronics</button>
    <button class="category-chip" data-category="household">🏠 Household</button>
    <button class="category-chip" data-category="beverages">🥤 Beverages</button>
    <button class="category-chip" data-category="snacks">🍿 Snacks</button>
  </div>

  <!-- Products Grid -->
  <div class="products-container">
    <div class="products-grid" id="products-grid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading products...</p>
      </div>
    </div>
  </div>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2 class="cart-title">Your Cart</h2>
      <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    
    <div class="cart-items" id="cart-items">
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <p>Your cart is empty</p>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total">₹0.00</span>
      </div>
      <button class="checkout-btn" onclick="showOrderForm()" id="checkout-btn" disabled>
        Proceed to Checkout
      </button>
    </div>
  </div>

  <!-- Order Form Modal -->
  <div class="cart-overlay" id="order-form-overlay" onclick="hideOrderForm()"></div>
  <div class="cart-drawer" id="order-form-drawer" style="max-width: 500px;">
    <div class="cart-header">
      <h2 class="cart-title">Checkout</h2>
      <button class="close-cart" onclick="hideOrderForm()">✕</button>
    </div>
    
    <div class="order-form">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" class="form-input" id="customer-name" placeholder="Enter your name">
        <div class="error-message" id="name-error"></div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input type="tel" class="form-input" id="customer-phone" placeholder="Enter your phone number">
        <div class="error-message" id="phone-error"></div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Delivery Address *</label>
        <textarea class="form-input form-textarea" id="customer-address" placeholder="Enter your delivery address"></textarea>
        <div class="error-message" id="address-error"></div>
      </div>
      
      <div class="error-message" id="order-error" style="margin-bottom: 1rem;"></div>
      
      <button class="checkout-btn" onclick="placeOrder()" id="place-order-btn">
        Place Order
      </button>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="success-modal" id="success-modal">
    <div class="success-content">
      <div class="success-icon">✅</div>
      <h2 class="success-title">Order Placed Successfully!</h2>
      <p class="success-message">Thank you for your order. We'll deliver it soon!</p>
      <p class="success-message" id="order-id-display"></p>
      <button class="success-btn" onclick="closeSuccessModal()">Continue Shopping</button>
    </div>
  </div>

  <script>
    // ── Configuration ──
    const SHOP_ID = new URLSearchParams(window.location.search).get('shop_id') || '1';
    const API_BASE = window.location.origin;
    
    // ── State Management ──
    let products = [];
    let cart = {};
    let currentCategory = 'all';
    
    // ── Initialize App ──
    document.addEventListener('DOMContentLoaded', () => {
      loadShopInfo();
      loadProducts();
      setupEventListeners();
    });
    
    // ── Load Shop Information ──
    async function loadShopInfo() {
      try {
        const response = await fetch(`${API_BASE}/shop/public/${SHOP_ID}`);
        if (response.ok) {
          const data = await response.json();
          document.getElementById('shop-name').textContent = data.shop_name || 'Retail Mind Store';
          document.getElementById('shop-description').textContent = data.address || 'Your local store';
          document.getElementById('shop-rating').textContent = data.rating || '4.5';
        }
      } catch (error) {
        console.error('Error loading shop info:', error);
      }
    }
    
    // ── Load Products ──
    async function loadProducts() {
      try {
        const response = await fetch(`${API_BASE}/api/inventory/products?shop_id=${SHOP_ID}`);
        if (response.ok) {
          const data = await response.json();
          products = normalizeProducts(data);
          document.getElementById('product-count').textContent = products.length;
          renderProducts();
        } else {
          showError('Failed to load products');
        }
      } catch (error) {
        console.error('Error loading products:', error);
        showError('Error loading products');
      }
    }
    
    // ── Normalize Products ──
    function normalizeProducts(data) {
      const products = Array.isArray(data) ? data : (data.products || []);
      return products.map(p => ({
        id: p.id || p.product_id,
        name: p.product_name || p.name || 'Product',
        price: parseFloat(p.price || p.selling_price || 0),
        stock: parseInt(p.stock || p.quantity || 0),
        category: p.category || 'general',
        image: p.image_url || p.imageUrl || `https://via.placeholder.com/300x200?text=${encodeURIComponent(p.name || 'Product')}`
      })).filter(p => p.price > 0 && p.stock > 0);
    }
    
    // ── Render Products ──
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      
      let filteredProducts = products.filter(p => {
        const matchesCategory = currentCategory === 'all' || 
          p.category.toLowerCase().includes(currentCategory);
        const matchesSearch = p.name.toLowerCase().includes(searchTerm);
        return matchesCategory && matchesSearch;
      });
      
      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-icon">📦</div>
            <p>No products found</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = filteredProducts.map(product => `
        <div class="product-card">
          <img src="${product.image}" alt="${product.name}" class="product-image" 
               onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
          <div class="product-content">
            <div class="product-category">${product.category}</div>
            <h3 class="product-name">${product.name}</h3>
            <div class="product-price">₹${product.price.toFixed(2)}</div>
            <div class="product-stock ${product.stock < 5 ? 'low' : ''}">
              ${product.stock < 5 ? '⚠️' : '✓'} ${product.stock} in stock
            </div>
            <button class="add-to-cart-btn" 
                    onclick="addToCart(${product.id})"
                    ${product.stock === 0 ? 'disabled' : ''}>
              ${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // ── Cart Management ──
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      if (cart[productId]) {
        if (cart[productId].qty < product.stock) {
          cart[productId].qty++;
        }
      } else {
        cart[productId] = { ...product, qty: 1 };
      }
      
      updateCartUI();
      showNotification(`${product.name} added to cart!`);
    }
    
    function removeFromCart(productId) {
      delete cart[productId];
      updateCartUI();
    }
    
    function updateQuantity(productId, change) {
      const product = products.find(p => p.id === productId);
      if (!product || !cart[productId]) return;
      
      const newQty = cart[productId].qty + change;
      if (newQty > 0 && newQty <= product.stock) {
        cart[productId].qty = newQty;
      } else if (newQty <= 0) {
        delete cart[productId];
      }
      
      updateCartUI();
    }
    
    function updateCartUI() {
      const cartItems = Object.values(cart);
      const total = cartItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
      
      document.getElementById('cart-count').textContent = cartItems.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cart-total').textContent = `₹${total.toFixed(2)}`;
      document.getElementById('checkout-btn').disabled = cartItems.length === 0;
      
      const cartItemsContainer = document.getElementById('cart-items');
      
      if (cartItems.length === 0) {
        cartItemsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <p>Your cart is empty</p>
          </div>
        `;
        return;
      }
      
      cartItemsContainer.innerHTML = cartItems.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="cart-item-image"
               onerror="this.src='https://via.placeholder.com/60x60?text=No+Image'">
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">₹${item.price.toFixed(2)}</div>
            <div class="cart-item-quantity">
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
              <span>${item.qty}</span>
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
            </div>
          </div>
          <button class="close-cart" onclick="removeFromCart(${item.id})" style="font-size: 1rem;">🗑️</button>
        </div>
      `).join('');
    }
    
    // ── UI Functions ──
    function toggleCart() {
      document.getElementById('cart-overlay').classList.toggle('active');
      document.getElementById('cart-drawer').classList.toggle('active');
    }
    
    function showOrderForm() {
      toggleCart();
      document.getElementById('order-form-overlay').classList.add('active');
      document.getElementById('order-form-drawer').classList.add('active');
    }
    
    function hideOrderForm() {
      document.getElementById('order-form-overlay').classList.remove('active');
      document.getElementById('order-form-drawer').classList.remove('active');
    }
    
    function showNotification(message) {
      // Simple notification - could be enhanced with a toast library
      console.log('Notification:', message);
    }
    
    function showError(message) {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-icon">❌</div>
          <p>${message}</p>
        </div>
      `;
    }
    
    // ── Order Placement ──
    async function placeOrder() {
      const name = document.getElementById('customer-name').value.trim();
      const phone = document.getElementById('customer-phone').value.trim();
      const address = document.getElementById('customer-address').value.trim();
      
      // Validation
      let valid = true;
      
      if (!name) {
        document.getElementById('name-error').textContent = 'Name is required';
        valid = false;
      } else {
        document.getElementById('name-error').textContent = '';
      }
      
      if (!phone || phone.length < 10) {
        document.getElementById('phone-error').textContent = 'Valid phone number is required';
        valid = false;
      } else {
        document.getElementById('phone-error').textContent = '';
      }
      
      if (!address) {
        document.getElementById('address-error').textContent = 'Address is required';
        valid = false;
      } else {
        document.getElementById('address-error').textContent = '';
      }
      
      if (!valid) return;
      
      if (Object.keys(cart).length === 0) {
        document.getElementById('order-error').textContent = 'Your cart is empty';
        return;
      }
      
      const btn = document.getElementById('place-order-btn');
      btn.disabled = true;
      btn.textContent = 'Placing Order...';
      
      try {
        const payload = {
          shop_id: parseInt(SHOP_ID),
          customer_name: name,
          phone: phone,
          delivery_address: address,
          items: Object.values(cart).map(item => ({
            product_id: item.id,
            quantity: item.qty
          }))
        };
        
        const response = await fetch(`${API_BASE}/store/guest-order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Success
          cart = {};
          updateCartUI();
          hideOrderForm();
          
          document.getElementById('order-id-display').textContent = 
            data.order_id ? `Order #${data.order_id}` : '';
          document.getElementById('success-modal').classList.add('active');
          
          // Clear form
          document.getElementById('customer-name').value = '';
          document.getElementById('customer-phone').value = '';
          document.getElementById('customer-address').value = '';
        } else {
          throw new Error(data.message || data.error || 'Order failed');
        }
      } catch (error) {
        document.getElementById('order-error').textContent = error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Place Order';
      }
    }
    
    function closeSuccessModal() {
      document.getElementById('success-modal').classList.remove('active');
    }
    
    // ── Event Listeners ──
    function setupEventListeners() {
      // Search
      document.getElementById('search-input').addEventListener('input', renderProducts);
      
      // Category filter
      document.querySelectorAll('.category-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentCategory = chip.dataset.category;
          renderProducts();
        });
      });
    }
  </script>
</body>
</html>
