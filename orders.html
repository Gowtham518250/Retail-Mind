<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Orders</title>
  <style>body{font-family:Inter,Arial;padding:24px;background:#f7fafc} .wrap{max-width:1000px;margin:24px auto} .order{background:#fff;padding:12px;border-radius:8px;margin-bottom:8px;border:1px solid #eef2f7}</style>
</head>
<body>
  <div class="wrap">
    <h2>My Orders</h2>
    <div id="ordersList">Loading orders…</div>
  </div>
  <script>
    async function load(){
      try{
        const res = await fetch('/store/my-orders');
        if(!res.ok){document.getElementById('ordersList').textContent='Orders unavailable';return}
        const json = await res.json(); const orders = Array.isArray(json)?json:(json.orders||[]);
        const el = document.getElementById('ordersList'); el.innerHTML=''; if(!orders.length) el.innerHTML='<div class=order>No orders found</div>';
        orders.forEach(o=>{ const d=document.createElement('div'); d.className='order'; d.innerHTML=`<div><strong>Order ${o.id||o.order_id||'?'}</strong> — ${o.status||o.state||''}</div><div class=muted>${o.created_at||o.created}</div>`; el.appendChild(d)});
      }catch(e){document.getElementById('ordersList').textContent='Failed to load orders'}
    }
    load();
  </script>
</body>
</html>
