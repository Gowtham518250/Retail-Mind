<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <style>body{font-family:Inter,Arial;padding:24px;background:#f7fafc} .box{max-width:520px;margin:40px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,0.06)} input{width:100%;padding:10px;margin:8px 0;border:1px solid #e6e9ee;border-radius:8px} button{padding:10px 14px;border-radius:8px;background:#ef4444;color:#fff;border:none;cursor:pointer}</style>
</head>
<body>
  <div class="box">
    <h2>Reset password</h2>
    <input id="email" placeholder="Phone or email" />
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="sendBtn">Send reset link</button>
      <button id="toLogin" style="background:#fff;border:1px solid #e6e9ee;color:#111">Back</button>
    </div>
  </div>
  <script>
    document.getElementById('toLogin').onclick = ()=>location.href='/login';
    document.getElementById('sendBtn').onclick = async ()=>{
      const email=document.getElementById('email').value;
      try{const res = await fetch('/auth/forgot-password',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email})}); if(res.ok) alert('Reset sent'); else {const j=await res.json(); alert(j.detail||'Failed')}}catch(e){alert('Network error')}
    }
  </script>
</body>
</html>
